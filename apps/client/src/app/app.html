<main>
  <div *ngIf="profile; else loading">
    <h1>{{ profile.name }}</h1>
    <p><strong>Role:</strong> {{ profile.role }}</p>

    <h3>Technical Skills:</h3>
    <ul>
      <li *ngFor="let skill of profile.skills">
        {{ skill }}
      </li>
    </ul>
  </div>

  <ng-template #loading>
    <p>Loading your CV data...</p>
  </ng-template>

  <hr>
  <button (click)="loadData()">Refresh from MongoDB</button>
</main>
